name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  ci:
    uses: netresearch/skill-repo-skill/.github/workflows/ci-python.yml@84dab32b407a17aa7826e30b86b3e9a503c75e32 # main
    permissions:
      contents: read
    with:
      python-versions: '["3.12"]'
      test-command: |
        echo "=== Validating shell script syntax ==="
        bash -n skills/automated-assessment/scripts/run-checkpoints.sh

        echo "=== Validating template checkpoint ==="
        f="skills/automated-assessment/assets/skill-template/checkpoints.yaml"
        grep -q "^version: 1" "$f" || { echo "Missing version: 1 in template"; exit 1; }
        grep -q "^skill_id:" "$f" || { echo "Missing skill_id in template"; exit 1; }
        grep -q "^mechanical:" "$f" || { echo "Missing mechanical section in template"; exit 1; }
        echo "Template checkpoint valid"

        echo "=== Validating SKILL.md word counts ==="
        for f in skills/*/SKILL.md; do
          words=$(wc -w < "$f")
          if [ "$words" -gt 500 ]; then
            echo "ERROR: $f is $words words (max 500)"
            exit 1
          fi
          echo "OK: $f ($words words)"
        done
